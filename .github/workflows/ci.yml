name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  frontend:
    name: Frontend Lint / Test / Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client

      - name: Run ESLint
        run: npm run lint
        working-directory: client

      - name: Run unit tests
        run: |
          mkdir -p ci-artifacts
          npm test -- --runInBand --json --outputFile=./ci-artifacts/frontend-test-results.json
        working-directory: client

      - name: Build production bundle
        run: npm run build
        working-directory: client

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-test-results
          path: client/ci-artifacts/frontend-test-results.json

  contract:
    name: Smart Contract Build / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Rust stable toolchain
        uses: rust-lang/setup-rust@v1
        with:
          rust-version: stable

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache Cargo build output
        uses: actions/cache@v3
        with:
          path: contract/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Create contract test artifact directory
        run: mkdir -p contract/test-results

      - name: Run contract tests
        run: |
          set -o pipefail
          cargo test --lib 2>&1 | tee ../../test-results/contract-test-log.txt
        working-directory: contract/contracts/contract

      - name: Upload contract test log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: contract-test-log
          path: contract/test-results/contract-test-log.txt

  quality:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies for quality checks
        run: npm ci
        working-directory: client

      - name: Run TypeScript type check
        run: npm run type-check
        working-directory: client

      - name: Run npm audit for high-severity issues
        run: npm audit --audit-level=high
        working-directory: client

  summary:
    name: CI Status Summary
    runs-on: ubuntu-latest
    needs: [frontend, contract, quality]
    if: always()

    steps:
      - name: Report job status
        run: |
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Contract: ${{ needs.contract.result }}"
          echo "Quality: ${{ needs.quality.result }}"

      - name: Summary message
        run: |
          if [[ '${{ needs.frontend.result }}' != 'success' || '${{ needs.contract.result }}' != 'success' || '${{ needs.quality.result }}' != 'success' ]]; then
            echo '⚠️ One or more checks failed. Review the logs and artifacts.'
            exit 1
          fi
          echo '✅ All checks passed!'
